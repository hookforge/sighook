name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  rust-macos-aarch64:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin
          components: rustfmt, clippy

      - name: Setup CMake 3.x (keystone build compatibility)
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: '3.31.6'

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Cargo fmt
        run: cargo fmt --all -- --check

      - name: Cargo check
        run: cargo check --all-targets --target aarch64-apple-darwin

      - name: Cargo test
        run: cargo test --doc --target aarch64-apple-darwin

      - name: Cargo clippy
        run: cargo clippy --all-targets --target aarch64-apple-darwin -- -D warnings

      - name: Build all examples (macOS, patch_asm enabled)
        run: cargo build --examples --features patch_asm --target aarch64-apple-darwin

      - name: Run macOS example smoke tests
        shell: bash
        run: |
          set -euo pipefail

          cc -O0 -fno-inline examples/instrument_with_original/target.c -o examples/instrument_with_original/app
          DYLIB="$PWD/target/aarch64-apple-darwin/debug/examples/libinstrument_with_original.dylib"
          OUT=$(DYLD_INSERT_LIBRARIES="$DYLIB" examples/instrument_with_original/app)
          echo "$OUT"
          [[ "$OUT" == *"calc(1, 2) = 42"* ]]

          cc -O0 -fno-inline examples/instrument_no_original/target.c -o examples/instrument_no_original/app
          DYLIB="$PWD/target/aarch64-apple-darwin/debug/examples/libinstrument_no_original.dylib"
          OUT=$(DYLD_INSERT_LIBRARIES="$DYLIB" examples/instrument_no_original/app)
          echo "$OUT"
          [[ "$OUT" == *"calc(4, 5) = 99"* ]]

          cc -O0 -fno-inline examples/instrument_unhook_restore/target.c -o examples/instrument_unhook_restore/app
          DYLIB="$PWD/target/aarch64-apple-darwin/debug/examples/libinstrument_unhook_restore.dylib"
          OUT=$(DYLD_INSERT_LIBRARIES="$DYLIB" examples/instrument_unhook_restore/app)
          echo "$OUT"
          [[ "$OUT" == *"hooked_calc(3, 4) = 123"* ]]
          [[ "$OUT" == *"calc(3, 4) = 7"* ]]

          cc -O0 -fno-inline examples/inline_hook_far/target.c -o examples/inline_hook_far/app
          DYLIB="$PWD/target/aarch64-apple-darwin/debug/examples/libinline_hook_far.dylib"
          OUT=$(DYLD_INSERT_LIBRARIES="$DYLIB" examples/inline_hook_far/app)
          echo "$OUT"
          [[ "$OUT" == *"target_add(6, 7) = 42"* ]]

          cc -O0 -fno-inline examples/inline_hook_signal/target.c -o examples/inline_hook_signal/app
          DYLIB="$PWD/target/aarch64-apple-darwin/debug/examples/libinline_hook_signal.dylib"
          OUT=$(DYLD_INSERT_LIBRARIES="$DYLIB" examples/inline_hook_signal/app)
          echo "$OUT"
          [[ "$OUT" == *"target_add(6, 7) = 42"* ]]

          cc -O0 -fno-inline examples/inline_hook_fpregs/target.c -o examples/inline_hook_fpregs/app
          DYLIB="$PWD/target/aarch64-apple-darwin/debug/examples/libinline_hook_fpregs.dylib"
          OUT=$(DYLD_INSERT_LIBRARIES="$DYLIB" examples/inline_hook_fpregs/app)
          echo "$OUT"
          [[ "$OUT" == *"target_vec_add = [42, 43, 44, 45]"* ]]

          cc -O0 -fno-inline examples/patchcode_add_to_mul/target.c -o examples/patchcode_add_to_mul/app
          DYLIB="$PWD/target/aarch64-apple-darwin/debug/examples/libpatchcode_add_to_mul.dylib"
          OUT=$(DYLD_INSERT_LIBRARIES="$DYLIB" examples/patchcode_add_to_mul/app)
          echo "$OUT"
          [[ "$OUT" == *"calc(6, 7) = 42"* ]]

          cc -O0 -fno-inline examples/patch_asm_add_to_mul/target.c -o examples/patch_asm_add_to_mul/app
          DYLIB="$PWD/target/aarch64-apple-darwin/debug/examples/libpatch_asm_add_to_mul.dylib"
          OUT=$(DYLD_INSERT_LIBRARIES="$DYLIB" examples/patch_asm_add_to_mul/app)
          echo "$OUT"
          [[ "$OUT" == *"calc(6, 7) = 42"* ]]

          cc -O0 -fno-inline examples/instrument_nop_x16/target.c -o examples/instrument_nop_x16/app
          DYLIB="$PWD/target/aarch64-apple-darwin/debug/examples/libinstrument_nop_x16.dylib"
          OUT=$(DYLD_INSERT_LIBRARIES="$DYLIB" examples/instrument_nop_x16/app)
          echo "$OUT"
          [[ "$OUT" == "read_marker() = 4660" ]]

          cc -O0 -fno-inline examples/instrument_blr_lr/target.c -o examples/instrument_blr_lr/app
          DYLIB="$PWD/target/aarch64-apple-darwin/debug/examples/libinstrument_blr_lr.dylib"
          OUT=$(DYLD_INSERT_LIBRARIES="$DYLIB" examples/instrument_blr_lr/app)
          echo "$OUT"
          OBSERVED=$(awk '{print $3}' <<<"$OUT")
          EXPECTED=$(awk '{print $6}' <<<"$OUT")
          [[ -n "$OBSERVED" && "$OBSERVED" == "$EXPECTED" ]]

          cc -O0 -fno-inline examples/instrument_b_cond_nv/target.c -o examples/instrument_b_cond_nv/app
          DYLIB="$PWD/target/aarch64-apple-darwin/debug/examples/libinstrument_b_cond_nv.dylib"
          OUT=$(DYLD_INSERT_LIBRARIES="$DYLIB" examples/instrument_b_cond_nv/app)
          echo "$OUT"
          [[ "$OUT" == "branch_nv() = 2" ]]

          cc -O0 -fno-inline examples/prepatched_upgrade_execute_original/target.c -o examples/prepatched_upgrade_execute_original/app
          DYLIB="$PWD/target/aarch64-apple-darwin/debug/examples/libprepatched_upgrade_execute_original.dylib"
          OUT=$(DYLD_INSERT_LIBRARIES="$DYLIB" examples/prepatched_upgrade_execute_original/app)
          echo "$OUT"
          [[ "$OUT" == "calc_prepatched() = 42" ]]

          cc -O0 -fno-inline -pthread examples/patch_race_stress/target.c -o examples/patch_race_stress/app
          DYLIB="$PWD/target/aarch64-apple-darwin/debug/examples/libpatch_race_stress.dylib"
          OUT=$(DYLD_INSERT_LIBRARIES="$DYLIB" examples/patch_race_stress/app)
          echo "$OUT"
          [[ "$OUT" == "stress ok" ]]

