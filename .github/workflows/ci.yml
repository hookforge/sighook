          OUT=$(DYLD_INSERT_LIBRARIES="$DYLIB" examples/instrument_unhook_restore/app)
          echo "$OUT"
          [[ "$OUT" == *"hooked_calc(3, 4) = 123"* ]]
          [[ "$OUT" == *"calc(3, 4) = 7"* ]]

          cc -O0 -fno-inline examples/inline_hook_far/target.c -o examples/inline_hook_far/app
          DYLIB="$PWD/target/x86_64-apple-darwin/debug/examples/libinline_hook_far.dylib"
          OUT=$(DYLD_INSERT_LIBRARIES="$DYLIB" examples/inline_hook_far/app)
          echo "$OUT"
          [[ "$OUT" == *"target_add(6, 7) = 42"* ]]

          cc -O0 -fno-inline examples/inline_hook_signal/target.c -o examples/inline_hook_signal/app
          DYLIB="$PWD/target/x86_64-apple-darwin/debug/examples/libinline_hook_signal.dylib"
          OUT=$(DYLD_INSERT_LIBRARIES="$DYLIB" examples/inline_hook_signal/app)
          echo "$OUT"
          [[ "$OUT" == *"target_add(6, 7) = 42"* ]]

          cc -O0 -fno-inline examples/inline_hook_fpregs/target.c -o examples/inline_hook_fpregs/app
          DYLIB="$PWD/target/x86_64-apple-darwin/debug/examples/libinline_hook_fpregs.dylib"
          OUT=$(DYLD_INSERT_LIBRARIES="$DYLIB" examples/inline_hook_fpregs/app)
          echo "$OUT"
          [[ "$OUT" == *"target_vec_add = [42, 43, 44, 45]"* ]]

          cc -O0 -fno-inline examples/patchcode_add_to_mul/target.c -o examples/patchcode_add_to_mul/app
          DYLIB="$PWD/target/x86_64-apple-darwin/debug/examples/libpatchcode_add_to_mul.dylib"
          OUT=$(DYLD_INSERT_LIBRARIES="$DYLIB" examples/patchcode_add_to_mul/app)
