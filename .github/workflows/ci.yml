          SO="$PWD/target/x86_64-unknown-linux-gnu/debug/examples/libpatch_asm_add_to_mul.so"
          OUT=$(LD_PRELOAD="$SO" examples/patch_asm_add_to_mul/app)
          echo "$OUT"
          [[ "$OUT" == *"calc(6, 7) = 42"* ]]

