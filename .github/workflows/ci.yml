  rust-android-aarch64:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android
          components: clippy

      - name: Setup CMake 3.x (keystone build compatibility)
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: '3.31.6'

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r26d

      - name: Configure Android linker
        shell: bash
        run: |
          set -euo pipefail
          echo "CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER=$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android34-clang" >> "$GITHUB_ENV"

      - name: Cargo check
        run: cargo check --all-targets --target aarch64-linux-android

      - name: Cargo check tests
        run: cargo check --tests --target aarch64-linux-android

      - name: Cargo clippy
        run: cargo clippy --all-targets --target aarch64-linux-android -- -D warnings

      - name: Build all examples (Android aarch64)
        run: cargo build --examples --target aarch64-linux-android
