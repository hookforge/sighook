          SO="$PWD/target/x86_64-unknown-linux-gnu/debug/examples/libinline_hook_signal.so"
          OUT=$(LD_PRELOAD="$SO" examples/inline_hook_signal/app)
          echo "$OUT"
          [[ "$OUT" == *"target_add(6, 7) = 42"* ]]

          cc -O0 -fno-inline -mavx -rdynamic examples/inline_hook_fpregs/target.c -o examples/inline_hook_fpregs/app
          SO="$PWD/target/x86_64-unknown-linux-gnu/debug/examples/libinline_hook_fpregs.so"
          OUT=$(LD_PRELOAD="$SO" examples/inline_hook_fpregs/app)
          echo "$OUT"
          [[ "$OUT" == *"target_vec_add = [42, 43, 44, 45, 46, 47, 48, 49]"* ]]

          cc -O0 -fno-inline -rdynamic examples/patchcode_add_to_mul/target.c -o examples/patchcode_add_to_mul/app
          SO="$PWD/target/x86_64-unknown-linux-gnu/debug/examples/libpatchcode_add_to_mul.so"
          OUT=$(LD_PRELOAD="$SO" examples/patchcode_add_to_mul/app)
          echo "$OUT"
